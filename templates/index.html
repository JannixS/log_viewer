<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java Log Viewer</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg2:       #1a1d27;
      --bg3:       #22263a;
      --border:    #2e3250;
      --accent:    #4f8ef7;
      --accent2:   #7c5ef7;
      --text:      #dde1f0;
      --text-dim:  #7a7f9a;
      --text-link: #7eb8f7;
      --trace:     #7a7f9a;
      --debug:     #5bc8d4;
      --info:      #57c77e;
      --warn:      #f0c060;
      --error:     #f07070;
      --fatal:     #f04040;
      --sidebar-w: 280px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    .shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .sidebar-header .logo span { color: var(--accent2); }

    .sidebar-nav {
      display: flex;
      gap: 0;
      padding: 8px 10px 0;
    }
    .sidebar-nav button {
      flex: 1;
      padding: 6px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      transition: color .15s, border-color .15s;
    }
    .sidebar-nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }

    /* App tree */
    .app-item { }
    .app-name {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      font-weight: 600;
      font-size: 13px;
      transition: background .1s, border-color .1s;
    }
    .app-name:hover { background: var(--bg3); }
    .app-name.active { border-left-color: var(--accent); background: var(--bg3); color: var(--accent); }
    .app-name .chevron {
      margin-left: auto;
      transition: transform .2s;
      font-size: 10px;
      color: var(--text-dim);
    }
    .app-name.open .chevron { transform: rotate(90deg); }
    .app-name .badge {
      background: var(--bg3);
      color: var(--text-dim);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      margin-left: auto;
    }

    .log-list { display: none; padding: 0 0 4px 0; }
    .log-list.open { display: block; }
    .log-entry {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px 5px 28px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      transition: background .1s, color .1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-entry:hover { background: var(--bg3); color: var(--text); }
    .log-entry.active { background: var(--bg3); color: var(--accent); }
    .log-entry .icon { flex-shrink: 0; font-size: 11px; }
    .log-entry .name { overflow: hidden; text-overflow: ellipsis; }
    .log-entry .size { margin-left: auto; flex-shrink: 0; font-size: 10px; }

    /* Search panel in sidebar */
    .search-panel { padding: 12px 10px; }
    .search-panel input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-panel input:focus { border-color: var(--accent); }
    .search-panel .search-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .search-panel select {
      flex: 1;
      padding: 6px 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .search-panel .btn-search {
      padding: 6px 14px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }
    .search-panel .btn-search:hover { filter: brightness(1.15); }

    .search-results { padding: 4px 0; }
    .search-result-item {
      padding: 8px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .1s;
    }
    .search-result-item:hover { background: var(--bg3); }
    .search-result-item .sr-app { font-size: 11px; color: var(--text-dim); }
    .search-result-item .sr-file { font-size: 12px; font-weight: 600; }
    .search-result-item .sr-count { font-size: 11px; color: var(--accent); }

    /* ------------------------------------------------------------------ */
    /* Main content                                                         */
    /* ------------------------------------------------------------------ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-wrap: wrap;
    }
    .toolbar .breadcrumb { font-size: 13px; color: var(--text-dim); flex: 1; min-width: 120px; }
    .toolbar .breadcrumb b { color: var(--text); }

    .toolbar .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .toolbar select, .toolbar input[type=text] {
      padding: 5px 9px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .toolbar select:focus, .toolbar input[type=text]:focus {
      border-color: var(--accent);
    }
    .toolbar input[type=text] { min-width: 160px; }
    .toolbar .btn {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .toolbar .btn-apply {
      background: var(--accent);
      color: #fff;
    }
    .toolbar .btn-apply:hover { filter: brightness(1.15); }
    .toolbar .btn-clear {
      background: var(--bg3);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .toolbar .btn-clear:hover { color: var(--text); }

    /* Exception pills */
    .exc-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      min-height: 32px;
      align-items: center;
    }
    .exc-list .label { font-size: 11px; color: var(--text-dim); margin-right: 4px; }
    .exc-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 12px;
      background: rgba(240, 112, 112, .15);
      border: 1px solid rgba(240, 112, 112, .35);
      color: var(--error);
      font-size: 11px;
      cursor: pointer;
      transition: background .1s;
    }
    .exc-pill:hover { background: rgba(240, 112, 112, .28); }
    .exc-pill.active { background: rgba(240, 112, 112, .35); font-weight: 700; }

    /* Log content area */
    .log-content { flex: 1; overflow: auto; position: relative; }
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12.5px;
    }
    .log-table tr { border-bottom: 1px solid rgba(46,50,80,.5); }
    .log-table tr:hover { background: rgba(79,142,247,.05); }

    .log-table .ln {
      width: 60px;
      min-width: 60px;
      text-align: right;
      padding: 2px 10px;
      color: var(--text-dim);
      user-select: none;
      border-right: 1px solid var(--border);
      font-size: 11px;
      vertical-align: top;
    }
    .log-table .lv {
      width: 58px;
      min-width: 58px;
      text-align: center;
      padding: 2px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      vertical-align: top;
    }
    .log-table .lt {
      padding: 2px 12px 2px 8px;
      white-space: pre-wrap;
      word-break: break-all;
      vertical-align: top;
    }

    /* Level colors */
    tr[data-level="TRACE"] .lv { color: var(--trace); }
    tr[data-level="DEBUG"] .lv { color: var(--debug); }
    tr[data-level="INFO"]  .lv { color: var(--info); }
    tr[data-level="WARN"]  .lv { color: var(--warn); }
    tr[data-level="ERROR"] .lv { color: var(--error); }
    tr[data-level="FATAL"] .lv, tr[data-level="SEVERE"] .lv { color: var(--fatal); }

    tr[data-level="ERROR"] .lt,
    tr[data-level="FATAL"] .lt,
    tr[data-level="SEVERE"] .lt { color: rgba(240,112,112,.9); }
    tr[data-level="WARN"]  .lt  { color: rgba(240,192,96,.85); }

    tr.is-stacktrace .lt { color: var(--text-dim); font-size: 11.5px; padding-left: 20px; }

    .highlight { background: rgba(240,192,96,.25); border-radius: 2px; padding: 0 1px; }

    /* Status bar */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 5px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      font-size: 11px;
      color: var(--text-dim);
    }
    .statusbar b { color: var(--text); }
    .statusbar .spacer { flex: 1; }
    .pagination { display: flex; align-items: center; gap: 4px; }
    .pagination button {
      padding: 3px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 11px;
    }
    .pagination button:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination .pg-info { min-width: 80px; text-align: center; }

    /* Empty / loading state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 12px; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3f60; }

    /* Toast notifications */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }
    .toast {
      padding: 10px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      animation: slidein .2s ease;
      max-width: 300px;
    }
    .toast.error { border-color: var(--error); color: var(--error); }
    @keyframes slidein {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Responsive */
    @media (max-width: 700px) {
      :root { --sidebar-w: 220px; }
      .toolbar { padding: 8px 10px; }
    }
  </style>
</head>
<body>

<div class="shell">
  <!-- ================================================================== -->
  <!-- SIDEBAR                                                              -->
  <!-- ================================================================== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Log<span>Viewer</span></div>
    </div>

    <div class="sidebar-nav">
      <button id="btn-tab-apps" class="active" onclick="showTab('apps')">📁 Apps</button>
      <button id="btn-tab-search" onclick="showTab('search')">🔍 Search</button>
    </div>

    <!-- Apps tab -->
    <div id="tab-apps" class="sidebar-scroll">
      <div id="app-tree">
        <div class="empty-state" style="height:120px">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- Search tab -->
    <div id="tab-search" class="sidebar-scroll" style="display:none">
      <div class="search-panel">
        <input id="gs-query" type="text" placeholder="Search text in all logs…" />
        <div class="search-row">
          <select id="gs-level">
            <option value="">Any level</option>
            <option value="DEBUG">DEBUG+</option>
            <option value="INFO">INFO+</option>
            <option value="WARN">WARN+</option>
            <option value="ERROR">ERROR+</option>
          </select>
          <button class="btn-search" onclick="globalSearch()">Search</button>
        </div>
        <div class="search-row" style="margin-top:6px">
          <input id="gs-exception" type="text" placeholder="Exception class…" style="flex:1;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none" />
        </div>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </aside>

  <!-- ================================================================== -->
  <!-- MAIN                                                                 -->
  <!-- ================================================================== -->
  <main class="main">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="breadcrumb" id="breadcrumb">Select an application and log file</div>
      <div class="filter-group" id="filter-group" style="display:none">
        <select id="f-level" title="Minimum log level">
          <option value="">All levels</option>
          <option value="TRACE">TRACE+</option>
          <option value="DEBUG">DEBUG+</option>
          <option value="INFO">INFO+</option>
          <option value="WARN">WARN+</option>
          <option value="ERROR">ERROR+</option>
          <option value="FATAL">FATAL+</option>
        </select>
        <input type="text" id="f-search" placeholder="Search in log…" />
        <input type="text" id="f-exception" placeholder="Exception class…" />
        <button class="btn btn-apply" onclick="applyFilters()">Apply</button>
        <button class="btn btn-clear" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <!-- Exception pills strip -->
    <div class="exc-list" id="exc-list" style="display:none">
      <span class="label">Exceptions:</span>
      <span id="exc-pills"></span>
    </div>

    <!-- Log content -->
    <div class="log-content" id="log-content">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>Welcome to LogViewer</p>
        <small>Select a log file from the sidebar to start viewing</small>
      </div>
    </div>

    <!-- Status bar -->
    <div class="statusbar" id="statusbar" style="display:none">
      <span>Lines: <b id="stat-lines">0</b></span>
      <span>Matched: <b id="stat-matched">0</b></span>
      <span class="spacer"></span>
      <div class="pagination">
        <button id="pg-first" onclick="goPage(1)" title="First page">«</button>
        <button id="pg-prev"  onclick="goPage(state.page - 1)" title="Previous">‹</button>
        <span class="pg-info" id="pg-info">1 / 1</span>
        <button id="pg-next" onclick="goPage(state.page + 1)" title="Next">›</button>
        <button id="pg-last" onclick="goPage(state.totalPages)" title="Last page">»</button>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<!-- ====================================================================== -->
<!-- JavaScript                                                              -->
<!-- ====================================================================== -->
<script>
'use strict';

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const state = {
  app: null,
  file: null,
  level: '',
  search: '',
  exception: '',
  page: 1,
  perPage: 500,
  totalPages: 1,
  totalLines: 0,
};

// ---------------------------------------------------------------------------
// Utility helpers
// ---------------------------------------------------------------------------
function fmt_size(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function escape_html(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, term) {
  if (!term) return escape_html(text);
  const esc_term = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escape_html(text).replace(new RegExp(esc_term, 'gi'), m => `<mark class="highlight">${m}</mark>`);
}

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

async function api(url) {
  const r = await fetch(url);
  if (!r.ok) {
    const body = await r.json().catch(() => ({ error: r.statusText }));
    throw new Error(body.error || r.statusText);
  }
  return r.json();
}

// ---------------------------------------------------------------------------
// Sidebar tabs
// ---------------------------------------------------------------------------
function showTab(name) {
  document.getElementById('tab-apps').style.display   = name === 'apps'   ? '' : 'none';
  document.getElementById('tab-search').style.display = name === 'search' ? '' : 'none';
  document.getElementById('btn-tab-apps').classList.toggle('active',   name === 'apps');
  document.getElementById('btn-tab-search').classList.toggle('active', name === 'search');
}

// ---------------------------------------------------------------------------
// App tree
// ---------------------------------------------------------------------------
async function loadApps() {
  const tree = document.getElementById('app-tree');
  try {
    const apps = await api('/api/apps');
    if (apps.length === 0) {
      tree.innerHTML = '<div style="padding:20px 14px;color:var(--text-dim);font-size:12px">No applications found.<br>Add log directories to the <code>logs/</code> folder.</div>';
      return;
    }
    tree.innerHTML = apps.map(a => `
      <div class="app-item" id="app-${CSS.escape(a.name)}">
        <div class="app-name" onclick="toggleApp('${escape_html(a.name)}', this)">
          <span>📦</span> ${escape_html(a.name)}
          <span class="badge">${a.log_count}</span>
          <span class="chevron">▶</span>
        </div>
        <div class="log-list" id="logs-${CSS.escape(a.name)}">
          <div style="padding:8px 14px;color:var(--text-dim);font-size:11px">Loading…</div>
        </div>
      </div>`).join('');
  } catch(e) {
    tree.innerHTML = `<div style="padding:14px;color:var(--error);font-size:12px">Error: ${escape_html(e.message)}</div>`;
  }
}

async function toggleApp(appName, el) {
  const listId  = 'logs-' + CSS.escape(appName);
  const listEl  = document.getElementById(listId);
  const isOpen  = listEl.classList.contains('open');

  // Close all others
  document.querySelectorAll('.log-list.open').forEach(l => {
    if (l.id !== listId) {
      l.classList.remove('open');
      l.closest('.app-item').querySelector('.app-name').classList.remove('open');
    }
  });

  if (isOpen) {
    listEl.classList.remove('open');
    el.classList.remove('open', 'active');
    return;
  }

  el.classList.add('open', 'active');
  listEl.classList.add('open');

  // Lazy-load file list
  if (listEl.dataset.loaded) return;
  listEl.dataset.loaded = '1';

  try {
    const logs = await api(`/api/apps/${encodeURIComponent(appName)}/logs`);
    if (logs.length === 0) {
      listEl.innerHTML = '<div style="padding:8px 14px 8px 28px;color:var(--text-dim);font-size:11px">No log files found.</div>';
      return;
    }
    listEl.innerHTML = logs.map(l => `
      <div class="log-entry" id="entry-${CSS.escape(appName)}-${CSS.escape(l.name)}"
           onclick="openLog('${escape_html(appName)}', '${escape_html(l.name)}', this)">
        <span class="icon">📄</span>
        <span class="name" title="${escape_html(l.name)}">${escape_html(l.name)}</span>
        <span class="size">${fmt_size(l.size)}</span>
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML = `<div style="padding:8px 14px 8px 28px;color:var(--error);font-size:11px">${escape_html(e.message)}</div>`;
  }
}

// ---------------------------------------------------------------------------
// Open & display a log file
// ---------------------------------------------------------------------------
async function openLog(appName, fileName, entryEl) {
  // Highlight active entry
  document.querySelectorAll('.log-entry.active').forEach(e => e.classList.remove('active'));
  if (entryEl) entryEl.classList.add('active');

  state.app       = appName;
  state.file      = fileName;
  state.page      = 1;
  state.exception = '';
  // Keep existing filters in the toolbar inputs
  state.level     = document.getElementById('f-level').value;
  state.search    = document.getElementById('f-search').value;

  document.getElementById('filter-group').style.display = '';
  document.getElementById('breadcrumb').innerHTML =
    `<b>${escape_html(appName)}</b> / ${escape_html(fileName)}`;

  await loadLogContent();
}

async function loadLogContent() {
  const content = document.getElementById('log-content');
  content.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

  const url = buildLogUrl();
  try {
    const data = await api(url);
    state.page       = data.page;
    state.totalPages = data.total_pages;
    state.totalLines = data.total_lines;

    renderLog(data);
    renderExcPills(data.exceptions);
    renderStatusBar(data);
  } catch(e) {
    content.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error</p><small>${escape_html(e.message)}</small></div>`;
    toast(e.message, 'error');
  }
}

function buildLogUrl() {
  const params = new URLSearchParams({ page: state.page, per_page: state.perPage });
  if (state.level)     params.set('level',     state.level);
  if (state.search)    params.set('search',    state.search);
  if (state.exception) params.set('exception', state.exception);
  return `/api/apps/${encodeURIComponent(state.app)}/logs/${encodeURIComponent(state.file)}?${params}`;
}

function renderLog(data) {
  const content = document.getElementById('log-content');
  if (data.lines.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No matching lines</p><small>Try relaxing your filters</small></div>';
    return;
  }

  const tbody = data.lines.map(l => {
    const levelClass = l.level || 'INFO';
    const textHtml   = highlight(l.text, state.search);
    return `<tr data-level="${levelClass}" class="${l.is_stacktrace ? 'is-stacktrace' : ''}">
      <td class="ln">${l.lineno}</td>
      <td class="lv">${levelClass}</td>
      <td class="lt">${textHtml}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `<table class="log-table"><tbody>${tbody}</tbody></table>`;
}

function renderExcPills(exceptions) {
  const strip = document.getElementById('exc-list');
  const pills = document.getElementById('exc-pills');
  if (!exceptions || exceptions.length === 0) {
    strip.style.display = 'none';
    return;
  }
  strip.style.display = '';
  pills.innerHTML = exceptions.map(e => `
    <span class="exc-pill${state.exception === e ? ' active' : ''}"
          onclick="filterException('${escape_html(e)}')"
          title="Filter by ${escape_html(e)}">
      ${escape_html(e.split('.').pop())}
    </span>`).join('');
}

function filterException(excName) {
  state.exception = (state.exception === excName) ? '' : excName;
  document.getElementById('f-exception').value = state.exception;
  state.page = 1;
  loadLogContent();
}

function renderStatusBar(data) {
  const bar = document.getElementById('statusbar');
  bar.style.display = '';
  document.getElementById('stat-lines').textContent   = data.total_lines.toLocaleString();
  document.getElementById('stat-matched').textContent = data.total_lines.toLocaleString();
  document.getElementById('pg-info').textContent      = `${data.page} / ${data.total_pages}`;

  document.getElementById('pg-first').disabled = data.page <= 1;
  document.getElementById('pg-prev').disabled  = data.page <= 1;
  document.getElementById('pg-next').disabled  = data.page >= data.total_pages;
  document.getElementById('pg-last').disabled  = data.page >= data.total_pages;
}

function goPage(p) {
  if (p < 1 || p > state.totalPages) return;
  state.page = p;
  loadLogContent();
  document.getElementById('log-content').scrollTop = 0;
}

// ---------------------------------------------------------------------------
// Filters
// ---------------------------------------------------------------------------
function applyFilters() {
  if (!state.app || !state.file) { toast('Open a log file first.'); return; }
  state.level     = document.getElementById('f-level').value;
  state.search    = document.getElementById('f-search').value.trim();
  state.exception = document.getElementById('f-exception').value.trim();
  state.page      = 1;
  loadLogContent();
}

function clearFilters() {
  document.getElementById('f-level').value     = '';
  document.getElementById('f-search').value    = '';
  document.getElementById('f-exception').value = '';
  state.level     = '';
  state.search    = '';
  state.exception = '';
  state.page      = 1;
  if (state.app && state.file) loadLogContent();
}

// Enter key in search inputs triggers apply
['f-search', 'f-exception'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilters();
  });
});

// ---------------------------------------------------------------------------
// Global search
// ---------------------------------------------------------------------------
async function globalSearch() {
  const q   = document.getElementById('gs-query').value.trim();
  const lvl = document.getElementById('gs-level').value;
  const exc = document.getElementById('gs-exception').value.trim();
  const out = document.getElementById('search-results');

  if (!q && !exc) { toast('Enter a search term or exception class.'); return; }

  out.innerHTML = '<div style="padding:14px;color:var(--text-dim)"><div class="spinner" style="margin:auto"></div></div>';

  const params = new URLSearchParams();
  if (q)   params.set('q', q);
  if (lvl) params.set('level', lvl);
  if (exc) params.set('exception', exc);

  try {
    const data = await api(`/api/search?${params}`);
    if (data.results.length === 0) {
      out.innerHTML = '<div style="padding:14px;color:var(--text-dim);font-size:12px">No matches found.</div>';
      return;
    }
    out.innerHTML = `<div style="padding:8px 14px;font-size:11px;color:var(--text-dim)">Found <b style="color:var(--accent)">${data.total.toLocaleString()}</b> line(s) across ${data.results.length} file(s)</div>` +
      data.results.map(r => `
        <div class="search-result-item" onclick="openFromSearch('${escape_html(r.app)}', '${escape_html(r.file)}', '${escape_html(q)}')">
          <div class="sr-app">📦 ${escape_html(r.app)}</div>
          <div class="sr-file">📄 ${escape_html(r.file)}</div>
          <div class="sr-count">${r.match_count.toLocaleString()} match(es)</div>
        </div>`).join('');
  } catch(e) {
    out.innerHTML = `<div style="padding:14px;color:var(--error);font-size:12px">${escape_html(e.message)}</div>`;
    toast(e.message, 'error');
  }
}

async function openFromSearch(appName, fileName, searchTerm) {
  showTab('apps');
  document.getElementById('f-search').value = searchTerm;
  state.search = searchTerm;

  // Expand app if needed
  const listId = 'logs-' + CSS.escape(appName);
  const listEl = document.getElementById(listId);
  if (!listEl) { await loadApps(); }

  const appNameEl = document.querySelector(`#app-${CSS.escape(appName)} .app-name`);
  if (appNameEl && !listEl?.classList.contains('open')) {
    await toggleApp(appName, appNameEl);
  }

  await openLog(appName, fileName, null);
}

// Enter key triggers global search
document.getElementById('gs-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') globalSearch();
});
document.getElementById('gs-exception').addEventListener('keydown', e => {
  if (e.key === 'Enter') globalSearch();
});

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
loadApps();
</script>
</body>
</html>
